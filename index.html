<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags — overridden per-page by react-helmet-async -->
    <title>Zyllo Tech | Software Development, AI &amp; Cloud Engineering Company India</title>
    <meta name="description" content="Zyllo Tech is a software engineering company delivering web &amp; mobile apps, AI/ML solutions, cloud DevOps, and quality engineering for enterprises across India and globally." />
    <meta name="author" content="Zyllo Tech" />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <meta name="theme-color" content="#f97316" />
    <link rel="canonical" href="https://zyllotech.com/" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zyllo Tech" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zyllo Tech" />
    <meta property="og:title" content="Zyllo Tech | Software Development, AI &amp; Cloud Engineering Company India" />
    <meta property="og:description" content="Zyllo Tech is a software engineering company delivering web &amp; mobile apps, AI/ML solutions, cloud DevOps, and quality engineering for enterprises across India and globally." />
    <meta property="og:url" content="https://zyllotech.com/" />
    <meta property="og:image" content="https://zyllotech.com/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ZylloTech" />
    <meta name="twitter:creator" content="@ZylloTech" />
    <meta name="twitter:title" content="Zyllo Tech | Software Development, AI &amp; Cloud Engineering Company India" />
    <meta name="twitter:description" content="Zyllo Tech is a software engineering company delivering web &amp; mobile apps, AI/ML solutions, cloud DevOps, and quality engineering for enterprises across India and globally." />
    <meta name="twitter:image" content="https://zyllotech.com/og-default.png" />

    <!-- Geo targeting — India-first, global -->
    <meta name="geo.region" content="IN-TG" />
    <meta name="geo.placename" content="Hyderabad, India" />
    <meta name="language" content="English" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />

    <!-- Performance: preconnect to key third-party origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
